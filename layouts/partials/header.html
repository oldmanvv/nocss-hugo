<header class="homepage-header">
    <h1>⌚️{{ .Site.Title }}</h1>
    {{ with .Site.Params.Subtitle }}<span class="subtitle">{{ . }}</span>{{ end }}
</header>
<hr />
&nbsp;&nbsp;<a href="{{ "/" | relLangURL }}">🏠首页</a>&nbsp;&nbsp;
{{ range $name, $taxonomy := .Site.Taxonomies.categories }}
|&nbsp;&nbsp;<a class="navbar-item" href="{{ "categories/" | relLangURL }}{{ $name | urlize }}">📁{{ $name | title }}</a>&nbsp;&nbsp;
{{ end }}
{{ range .Site.Menus.main }}
|&nbsp;&nbsp;<a href="{{ .Page.RelPermalink | default .URL }}" title="{{ .Name }}" {{ if not .Page }}target="_blank"{{ end }}>{{ .Name }}</a>&nbsp;&nbsp;
{{ end }}
<hr />
